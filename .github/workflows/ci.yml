# OpenTrade — TypeScript / pnpm CI pipeline
#
# Runs on every PR against main and every push to main. Covers the 7 TS
# packages in the monorepo (apps/web, apps/console, apps/api, packages/db,
# packages/ui, packages/shared, packages/config); packages/contracts has
# its own pipeline in `contracts.yml` because it has different toolchain
# (Foundry, git submodules) and different path filter.
#
# See ADR-0018 for the full design rationale (D1: three independent
# workflows; D3: Corepack-managed pnpm; D4: local turbo cache only in
# Phase 0; D8: zero AWS credentials).

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a developer pushes fast iterations.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI is purely read-only. Per ADR-0018 D8 + rule 80, no AWS credentials
# are configured in Phase 0; GitHub OIDC arrives in Phase 4+.
permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # `format` runs root-level `pnpm format:check`; everything else
        # runs the matching turbo task across all TS packages.
        task: [lint, typecheck, test, format]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # ci.yml never compiles Solidity, so OZ + forge-std submodules
          # (~80 MB) are unnecessary here. contracts.yml fetches them.
          submodules: false

      - name: Setup Node 22 from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack and pin pnpm
        # Corepack reads `packageManager` from root package.json
        # (currently pnpm@9.15.4) — single source of truth.
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.task }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.task }}-${{ github.ref_name }}-
            turbo-${{ matrix.task }}-

      - name: Install dependencies
        # --frozen-lockfile guarantees pnpm-lock.yaml is authoritative;
        # any drift fails CI rather than silently mutating the lockfile.
        # packages/db has `postinstall: prisma generate` which runs here
        # (lazy env loader in packages/db/src/env.ts means no DATABASE_URL
        # required during generate; per ADR-0014).
        run: pnpm install --frozen-lockfile

      - name: Run lint
        if: matrix.task == 'lint'
        # packages/contracts has its own lint (solhint) in contracts.yml
        # workflow; --filter excludes it here so we don't double-run and
        # don't need OZ submodules in this workflow.
        run: pnpm turbo run lint --filter='!@opentrade/contracts'

      - name: Run typecheck
        if: matrix.task == 'typecheck'
        run: pnpm turbo run typecheck --filter='!@opentrade/contracts'

      - name: Run unit tests
        if: matrix.task == 'test'
        # Use test:unit (no ^build dependency) for fast Phase-0 runs.
        # All TS packages currently echo 'no tests yet' here; this job
        # exists so the wiring is in place when Phase 1 adds real tests.
        run: pnpm turbo run test:unit --filter='!@opentrade/contracts'

      - name: Run format check
        if: matrix.task == 'format'
        # Prettier runs from root; no turbo task needed.
        run: pnpm format:check

  # Playwright e2e job for `apps/web` (M6.3b). Lives in its own job
  # (not the matrix above) because it needs the chromium browser binary
  # cached separately, a longer timeout, and to spin up `next dev` plus
  # the local API stub server. Per cursor rule 60 the stub is fully
  # air-gapped — no real API / DB / IPFS / Privy / chain in this job.
  e2e-web:
    name: e2e (web)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node 22 from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack and pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Playwright bundles its browser version into its npm version;
          # bumping `@playwright/test` automatically invalidates the cache.
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser (chromium only)
        # Phase 0 we test on chromium only — adding firefox + webkit triples
        # the download time and only one of three breakages would actually
        # be browser-specific given our current surface.
        run: pnpm --filter @opentrade/web exec playwright install --with-deps chromium

      - name: Run Playwright e2e
        env:
          CI: "true"
        run: pnpm --filter @opentrade/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
