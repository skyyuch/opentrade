# OpenTrade — UAT deploy pipeline (ADR-0047, ADR-0051)
#
# On every push to main:
#   1. migrate gate (ADR-0051): build/push the :migrate image, run
#      `prisma migrate deploy` as a one-off ECS task, and wait for exit 0.
#   2. only if migration succeeds, build the three runtime images, push them
#      to ECR (:dev + :<sha>), and force new ECS deployments so Fargate pulls
#      the fresh :dev tag. The outbox worker shares the api image
#      (ADR-0046 D2), so the api job rolls two services.
#
# The migrate-before-rollout ordering kills the half-deploy class of bug
# (new code shipped against an un-migrated schema). A failed migration blocks
# the rollout, so services keep serving the previous consistent image.
#
# Authentication is GitHub OIDC. Two single-purpose roles
# (modules/github-oidc-deploy): the migrate gate assumes
# opentrade-dev-github-migrate (RunTask the migrate task + PassRole its two
# roles + push :migrate, nothing else — ADR-0051 D2); the rollout jobs assume
# opentrade-dev-github-deploy (ECR push + force-deploy only — ADR-0047 D2).
# No long-lived AWS keys exist in this repository (rule 80); neither role can
# register task definitions.
#
# Terraform is deliberately absent here: plan/apply stay on the owner's
# machine (rule 80 / ADR-0018 D7). This workflow is inert until the owner
# applies the Terraform and sets the repository variables below — the
# job-level guards keep it green (skipped) before then. Because the rollout
# jobs `needs: migrate`, an unset AWS_MIGRATE_ROLE_ARN skips the whole deploy.
#
# Required repository variables (Settings → Secrets and variables →
# Actions → Variables), set after `terraform apply`:
#   AWS_DEPLOY_ROLE_ARN          — `terraform output github_deploy_role_arn`
#   AWS_MIGRATE_ROLE_ARN         — `terraform output github_migrate_role_arn`
#   AWS_MIGRATE_SUBNET_IDS       — comma-separated private subnet IDs
#                                  (`terraform output vpc_private_subnet_ids`)
#   AWS_MIGRATE_SECURITY_GROUP_ID — `terraform output migrate_security_group_id`
#   AWS_REGION                   — ap-southeast-1 (rule 80: never hardcoded)
#   NEXT_PUBLIC_API_URL          — `terraform output api_cdn_url`
#   NEXT_PUBLIC_PRIVY_APP_ID     — Privy dashboard app id (public value)
#   NEXT_PUBLIC_CHAIN_ID         — optional; defaults to 84532 (Base Sepolia)

name: deploy

on:
  push:
    branches: [main]
  # Manual re-run lever: re-deploy the current main without a new commit
  # (e.g. after the owner rotates a secret value or the first bootstrap).
  workflow_dispatch:

# Never cancel a mid-rollout deploy; queue the next one instead.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC token for aws-actions/configure-aws-credentials

jobs:
  # ---------------------------------------------------------------------------
  # Migrate gate (ADR-0051): apply pending DB migrations BEFORE any rollout.
  # Builds/pushes the :migrate image, runs `prisma migrate deploy` as a one-off
  # ECS task, and fails the job (blocking rollout) on a non-zero task exit.
  # Migrate-only — never seeds/enriches (ADR-0051 D3); reference-data stays an
  # explicit owner/dispatch operation (ADR-0049).
  # ---------------------------------------------------------------------------
  migrate:
    name: migrate
    # Inert until the migration role exists — see header. A skipped migrate job
    # cascades to skip the dependent rollout jobs, so deploy is gated too.
    if: vars.AWS_MIGRATE_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_MIGRATE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push migrate image
        # The migrate stage is FROM builder, sharing every layer with the api
        # build up to the toolchain — cache-from the api scope for warm builds.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrate
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/opentrade-api:migrate
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=migrate

      - name: Run migration and wait for completion
        # Override the task command to migrate-only (the image default also
        # seeds; we never auto-seed — ADR-0051 D3). Subnets + SG come from repo
        # variables (account-specific IDs, not hardcoded — rule 80).
        run: |
          set -euo pipefail
          task_arn=$(aws ecs run-task \
            --cluster opentrade-dev-cluster \
            --task-definition opentrade-dev-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.AWS_MIGRATE_SUBNET_IDS }}],securityGroups=[${{ vars.AWS_MIGRATE_SECURITY_GROUP_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["sh","-c","pnpm exec prisma migrate deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Launched migrate task: $task_arn"
          task_id="${task_arn##*/}"

          aws ecs wait tasks-stopped --cluster opentrade-dev-cluster --tasks "$task_id"

          exit_code=$(aws ecs describe-tasks \
            --cluster opentrade-dev-cluster --tasks "$task_id" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          stopped_reason=$(aws ecs describe-tasks \
            --cluster opentrade-dev-cluster --tasks "$task_id" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "Migrate task exit code: $exit_code ($stopped_reason)"

          if [ "$exit_code" != "0" ]; then
            echo "::error::Migration failed (exit $exit_code) — blocking rollout. Check CloudWatch log group for the migrate/migrate/$task_id stream."
            exit 1
          fi

  deploy:
    name: ${{ matrix.app }}
    # Rollout only after a successful migration (ADR-0051). `needs: migrate`
    # means a skipped/failed migrate job skips the rollout, never half-deploys.
    needs: migrate
    # Inert until the deploy role exists — see header.
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # One app failing should not stop the others from shipping.
      fail-fast: false
      matrix:
        include:
          - app: api
            repository: opentrade-api
            # Worker reuses the api image with a command override.
            services: opentrade-dev-api opentrade-dev-outbox-worker
          - app: web
            repository: opentrade-web
            services: opentrade-dev-web
          - app: console
            repository: opentrade-console
            services: opentrade-dev-console

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Fail fast on missing front-end build args
        # NEXT_PUBLIC_* are compile-time constants (ADR-0046 D5); building
        # without them would bake a broken bundle and deploy it.
        if: matrix.app != 'api'
        env:
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          PRIVY_APP_ID: ${{ vars.NEXT_PUBLIC_PRIVY_APP_ID }}
        run: |
          if [ -z "$API_URL" ] || [ -z "$PRIVY_APP_ID" ]; then
            echo "::error::NEXT_PUBLIC_API_URL and NEXT_PUBLIC_PRIVY_APP_ID repository variables must be set before front-end deploys."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        # Buildx enables the GitHub Actions layer cache below; without it
        # every deploy rebuilds pnpm install + next build from scratch.
        uses: docker/setup-buildx-action@v3

      - name: Build and push api image
        if: matrix.app == 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:dev
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Build and push ${{ matrix.app }} image
        if: matrix.app != 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:dev
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_PRIVY_APP_ID=${{ vars.NEXT_PUBLIC_PRIVY_APP_ID }}
            NEXT_PUBLIC_CHAIN_ID=${{ vars.NEXT_PUBLIC_CHAIN_ID || '84532' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Force new ECS deployments
        # :dev is MUTABLE and the task definitions pin it, so a forced
        # deployment is all it takes — no task-definition registration.
        run: |
          for service in ${{ matrix.services }}; do
            aws ecs update-service \
              --cluster opentrade-dev-cluster \
              --service "$service" \
              --force-new-deployment \
              --query 'service.{service: serviceName, status: status}' \
              --output table
          done

      - name: Wait for services to stabilise
        # Circuit breaker (ecs-service module) auto-rolls-back a bad
        # image; this wait surfaces that as a red job instead of a
        # silently reverted deploy.
        run: |
          aws ecs wait services-stable \
            --cluster opentrade-dev-cluster \
            --services ${{ matrix.services }}
